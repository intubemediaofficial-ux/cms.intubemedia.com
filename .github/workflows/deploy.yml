name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -euo pipefail
            cd /var/www/cms-frontend
            git pull --ff-only origin main
            npm ci
            npm run build
            if ! grep -q '^CRON_SECRET=' .env.local; then
              printf '\nCRON_SECRET=%s\n' "$(openssl rand -hex 32)" >> .env.local
            fi
            pm2 restart cms-frontend --update-env
            pm2 save
            chmod +x scripts/run-cms-data-sync.sh scripts/install-cms-data-sync-cron.sh
            scripts/install-cms-data-sync-cron.sh
