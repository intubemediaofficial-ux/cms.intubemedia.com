name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          VENDOR_GOOGLE_SHEET_ID: ${{ secrets.VENDOR_GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SHEETS_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_SHEETS_PRIVATE_KEY: ${{ secrets.GOOGLE_SHEETS_PRIVATE_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: VENDOR_GOOGLE_SHEET_ID,GOOGLE_SHEETS_SERVICE_ACCOUNT_EMAIL,GOOGLE_SHEETS_PRIVATE_KEY
          script: |
            set -euo pipefail
            cd /var/www/cms-frontend
            git pull --ff-only origin main
            npm ci
            npm run build
            python3 - <<'PY'
            import json
            import os
            from pathlib import Path

            keys = [
                "VENDOR_GOOGLE_SHEET_ID",
                "GOOGLE_SHEETS_SERVICE_ACCOUNT_EMAIL",
                "GOOGLE_SHEETS_PRIVATE_KEY",
            ]
            values = {key: os.environ.get(key, "") for key in keys}
            if all(values.values()):
                env_file = Path(".env.local")
                lines = env_file.read_text().splitlines() if env_file.exists() else []
                lines = [
                    line
                    for line in lines
                    if not any(line.startswith(f"{key}=") for key in keys)
                ]
                lines.extend(f"{key}={json.dumps(values[key])}" for key in keys)
                env_file.write_text("\n".join(lines) + "\n")
            PY
            if ! grep -q '^CRON_SECRET=' .env.local; then
              printf '\nCRON_SECRET=%s\n' "$(openssl rand -hex 32)" >> .env.local
            fi
            pm2 restart cms-frontend --update-env
            pm2 save
            chmod +x scripts/run-cms-data-sync.sh scripts/install-cms-data-sync-cron.sh
            scripts/install-cms-data-sync-cron.sh
