<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bainsla Music — Admin Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<!-- LOGIN -->
<div id="loginPage" class="login-page">
  <div class="login-card">
    <div class="login-logo">♪ BAINSLA MUSIC</div>
    <p class="login-sub">Admin Dashboard</p>
    <form id="loginForm">
      <input type="text" id="loginUser" placeholder="Username" required>
      <input type="password" id="loginPass" placeholder="Password" required>
      <button type="submit">LOGIN</button>
      <p id="loginError" class="error"></p>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard" style="display:none">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">♪</span>
      <div>
        <div class="logo-text">BAINSLA MUSIC</div>
        <div class="logo-sub">Admin Panel</div>
      </div>
    </div>
    <ul class="nav-list">
      <li class="nav-item active" data-section="overview">📊 Overview</li>
      <li class="nav-item" data-section="banners">🖼️ Hero Banners</li>
      <li class="nav-item" data-section="releases">🎵 Releases</li>
      <li class="nav-item" data-section="artists">🎤 Artists</li>
      <li class="nav-item" data-section="videos">📹 Videos</li>
      <li class="nav-item" data-section="catalogue">📁 Catalogue</li>
      <li class="nav-item" data-section="licensing">📋 Licensing</li>
      <li class="nav-item" data-section="inquiries">📩 Inquiries</li>
      <li class="nav-item" data-section="settings">⚙️ Settings</li>
    </ul>
    <div class="sidebar-footer">
      <a href="/" class="view-site">← View Website</a>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
  </nav>
  <main class="main-content">
    <header class="top-bar">
      <h1 id="pageTitle">Dashboard Overview</h1>
      <div class="top-actions">
        <span id="welcomeText">Welcome, Admin</span>
      </div>
    </header>
    <div id="contentArea" class="content-area"></div>
  </main>
</div>

<script src="dashboard.js"></script>
</body>
</html>
