<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bainsla Music - Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="login-page" class="login-container">
        <div class="login-box">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="currentColor" width="48" height="48"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                <h1>Bainsla Music</h1>
                <p>Admin Panel</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
                <p id="login-error" class="error-text"></p>
            </form>
        </div>
    </div>

    <div id="admin-panel" class="admin-panel" style="display:none">
        <nav class="sidebar">
            <div class="sidebar-header">
                <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                <span>Bainsla Admin</span>
            </div>
            <ul class="nav-menu">
                <li><a href="#" data-section="dashboard" class="active"><span class="icon">📊</span> Dashboard</a></li>
                <li><a href="#" data-section="hero_slides"><span class="icon">🎬</span> Hero Slides</a></li>
                <li><a href="#" data-section="videos"><span class="icon">🎵</span> Videos</a></li>
                <li><a href="#" data-section="services"><span class="icon">⚙️</span> Services</a></li>
                <li><a href="#" data-section="channels"><span class="icon">📺</span> Channels</a></li>
                <li><a href="#" data-section="directors"><span class="icon">👤</span> Directors</a></li>
                <li><a href="#" data-section="testimonials"><span class="icon">💬</span> Testimonials</a></li>
                <li><a href="#" data-section="stats"><span class="icon">📈</span> Stats</a></li>
                <li><a href="#" data-section="settings"><span class="icon">🔧</span> Settings</a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-danger btn-full">Logout</button>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="menu-toggle">☰</button>
                <h2 id="page-title">Dashboard</h2>
                <div class="user-info">Admin</div>
            </header>
            <div id="content-area" class="content-area">
            </div>
        </main>
    </div>

    <div id="modal" class="modal" style="display:none">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Edit</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button id="modal-save" class="btn btn-primary">Save</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
