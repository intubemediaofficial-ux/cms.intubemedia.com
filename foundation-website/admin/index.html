<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Hope 4 Kids Care Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #3b82f6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { background: white; border-radius: 20px; padding: 50px 40px; width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
    .login-logo { text-align: center; margin-bottom: 30px; }
    .login-logo img { height: 80px; margin-bottom: 15px; }
    .login-logo h2 { color: #1d4ed8; font-size: 1.3rem; font-weight: 700; }
    .login-logo p { color: #64748b; font-size: 0.85rem; margin-top: 5px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-group .input-wrapper { position: relative; }
    .form-group .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #9ca3af; }
    .form-group input { width: 100%; padding: 14px 15px 14px 45px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 0.95rem; font-family: 'Poppins', sans-serif; transition: all 0.3s; }
    .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 4px rgba(59,130,246,0.1); }
    .login-btn { width: 100%; padding: 14px; background: #1d4ed8; color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.3s; }
    .login-btn:hover { background: #1e40af; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(29,78,216,0.3); }
    .error-msg { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 10px 15px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 15px; display: none; }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #6b7280; font-size: 0.85rem; text-decoration: none; }
    .back-link a:hover { color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo">
      <img src="../images/logo.png" alt="Hope 4 Kids Care Foundation">
      <h2>Admin Panel</h2>
      <p>Hope 4 Kids Care Foundation</p>
    </div>
    <div class="error-msg" id="errorMsg">
      <i class="fas fa-exclamation-circle"></i> Invalid credentials. Please try again.
    </div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
      </div>
      <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> &nbsp;Log In</button>
    </form>
    <div class="back-link">
      <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to Website</a>
    </div>
  </div>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      // Default admin credentials
      if (username === 'admin' && password === 'Hope4Kids@2026') {
        sessionStorage.setItem('adminLoggedIn', 'true');
        sessionStorage.setItem('adminUser', username);
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        setTimeout(() => { document.getElementById('errorMsg').style.display = 'none'; }, 3000);
      }
      return false;
    }
    // If already logged in, redirect
    if (sessionStorage.getItem('adminLoggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
