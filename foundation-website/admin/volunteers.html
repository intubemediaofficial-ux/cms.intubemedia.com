<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteers — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo"><img src="../images/logo.png" alt="Logo"><h3>Admin Panel</h3></div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
      <a href="donations.html"><i class="fas fa-hand-holding-heart"></i> Donations</a>
      <a href="celebrations.html"><i class="fas fa-birthday-cake"></i> Celebrations</a>
      <a href="volunteers.html" class="active"><i class="fas fa-users"></i> Volunteers</a>
      <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
      <a href="content.html"><i class="fas fa-images"></i> Content</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
      <a href="../index.html"><i class="fas fa-globe"></i> View Site</a>
    </div>
  </div>

  <div class="main-content">
    <div class="topbar">
      <h1>Volunteer Applications</h1>
      <div class="topbar-right"><span class="admin-name"><i class="fas fa-user-circle"></i> Admin</span></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card stat-blue"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3>156</h3><p>Total Applications</p></div></div>
      <div class="stat-card stat-green"><div class="stat-icon"><i class="fas fa-user-check"></i></div><div class="stat-info"><h3>89</h3><p>Approved</p></div></div>
      <div class="stat-card stat-orange"><div class="stat-icon"><i class="fas fa-user-clock"></i></div><div class="stat-info"><h3>42</h3><p>Pending Review</p></div></div>
      <div class="stat-card stat-purple"><div class="stat-icon"><i class="fas fa-star"></i></div><div class="stat-info"><h3>25</h3><p>Active Volunteers</p></div></div>
    </div>

    <div class="card">
      <div class="toolbar">
        <div class="search-box"><i class="fas fa-search"></i><input type="text" placeholder="Search volunteer..." id="searchVol" onkeyup="filterTable()"></div>
        <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add Volunteer</button>
      </div>
      <div class="table-container">
        <table>
          <thead><tr><th>S.No</th><th>Name</th><th>Email</th><th>Phone</th><th>City</th><th>Skills</th><th>Applied</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="volBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header"><h3>Add Volunteer</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <form onsubmit="addVolunteer(event)">
        <div class="form-group"><label>Full Name *</label><input type="text" id="volName" required></div>
        <div class="form-group"><label>Email *</label><input type="email" id="volEmail" required></div>
        <div class="form-group"><label>Phone *</label><input type="text" id="volPhone" required></div>
        <div class="form-group"><label>City</label><input type="text" id="volCity"></div>
        <div class="form-group"><label>Skills / Interest</label><input type="text" id="volSkills" placeholder="e.g. Teaching, Healthcare, Events"></div>
        <div class="form-group"><label>Status</label>
          <select id="volStatus"><option>Pending</option><option>Approved</option><option>Rejected</option><option>Active</option></select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Save Volunteer</button>
      </form>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem('adminLoggedIn') !== 'true') { window.location.href = 'index.html'; }
    function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

    let volunteers = JSON.parse(localStorage.getItem('volunteers')) || [
      { id: 1, name: 'Aarav Mehta', email: 'aarav@gmail.com', phone: '9876543210', city: 'Jaipur', skills: 'Teaching, Mentoring', date: '2026-05-10', status: 'Approved' },
      { id: 2, name: 'Ishita Sharma', email: 'ishita@gmail.com', phone: '9876543211', city: 'Delhi', skills: 'Healthcare, First Aid', date: '2026-05-09', status: 'Active' },
      { id: 3, name: 'Rohan Gupta', email: 'rohan@gmail.com', phone: '9876543212', city: 'Mumbai', skills: 'Events, Photography', date: '2026-05-08', status: 'Pending' },
      { id: 4, name: 'Sneha Patel', email: 'sneha@gmail.com', phone: '9876543213', city: 'Ahmedabad', skills: 'Teaching, Arts', date: '2026-05-07', status: 'Approved' },
      { id: 5, name: 'Karan Singh', email: 'karan@gmail.com', phone: '9876543214', city: 'Jaipur', skills: 'Sports, Fitness', date: '2026-05-06', status: 'Active' },
      { id: 6, name: 'Priyanka Yadav', email: 'priyanka@gmail.com', phone: '9876543215', city: 'Jodhpur', skills: 'Counseling, Teaching', date: '2026-05-05', status: 'Pending' },
      { id: 7, name: 'Manish Tiwari', email: 'manish@gmail.com', phone: '9876543216', city: 'Udaipur', skills: 'IT, Social Media', date: '2026-05-04', status: 'Approved' },
      { id: 8, name: 'Divya Rathore', email: 'divya@gmail.com', phone: '9876543217', city: 'Kota', skills: 'Nutrition, Cooking', date: '2026-05-03', status: 'Pending' },
      { id: 9, name: 'Ankit Verma', email: 'ankit@gmail.com', phone: '9876543218', city: 'Jaipur', skills: 'Legal, Documentation', date: '2026-05-02', status: 'Rejected' },
      { id: 10, name: 'Megha Soni', email: 'megha@gmail.com', phone: '9876543219', city: 'Ajmer', skills: 'Music, Dance', date: '2026-05-01', status: 'Active' },
    ];

    function renderTable() {
      const tbody = document.getElementById('volBody');
      tbody.innerHTML = volunteers.map((v, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${v.name}</strong></td>
          <td>${v.email}</td>
          <td>${v.phone}</td>
          <td>${v.city}</td>
          <td>${v.skills}</td>
          <td>${new Date(v.date).toLocaleDateString('en-IN', {day:'numeric',month:'short'})}</td>
          <td><span class="badge ${v.status === 'Approved' || v.status === 'Active' ? 'badge-success' : v.status === 'Rejected' ? 'badge-danger' : 'badge-pending'}">${v.status}</span></td>
          <td>
            <button onclick="approveVol(${v.id})" style="border:none;background:none;color:#16a34a;cursor:pointer" title="Approve"><i class="fas fa-check"></i></button>
            <button onclick="deleteVol(${v.id})" style="border:none;background:none;color:#dc2626;cursor:pointer" title="Delete"><i class="fas fa-trash"></i></button>
          </td>
        </tr>`).join('');
    }

    function addVolunteer(e) {
      e.preventDefault();
      volunteers.unshift({
        id: Date.now(), name: document.getElementById('volName').value, email: document.getElementById('volEmail').value,
        phone: document.getElementById('volPhone').value, city: document.getElementById('volCity').value,
        skills: document.getElementById('volSkills').value, date: new Date().toISOString().split('T')[0],
        status: document.getElementById('volStatus').value
      });
      localStorage.setItem('volunteers', JSON.stringify(volunteers));
      renderTable(); closeModal(); e.target.reset();
    }

    function approveVol(id) { volunteers = volunteers.map(v => v.id === id ? {...v, status: 'Approved'} : v); localStorage.setItem('volunteers', JSON.stringify(volunteers)); renderTable(); }
    function deleteVol(id) { if(confirm('Delete?')) { volunteers = volunteers.filter(v => v.id !== id); localStorage.setItem('volunteers', JSON.stringify(volunteers)); renderTable(); } }
    function filterTable() { const q = document.getElementById('searchVol').value.toLowerCase(); document.querySelectorAll('#volBody tr').forEach(r => { r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none'; }); }
    function openModal() { document.getElementById('addModal').classList.add('active'); }
    function closeModal() { document.getElementById('addModal').classList.remove('active'); }
    renderTable();
  </script>
</body>
</html>
